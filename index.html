<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考試資料產生器 V4.0 Pro</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Icons (Lucide) -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Mammoth (解析 DOCX) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  
  <!-- Html2Canvas (截圖) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    textarea { outline: none; }
    
    /* Toast 動畫 */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .toast-enter { animation: fadeInUp 0.3s ease-out forwards; }

    /* 列印專屬樣式 */
    @media print {
      body { background-color: white !important; }
      #app { margin: 0; padding: 0; }
      @page { margin: 1.5cm; }
      .print-hidden { display: none !important; }
      .print-block { display: block !important; }
      .print-flex { display: flex !important; }
      .print-inline-block { display: inline-block !important; }
      .print-border-0 { border: none !important; }
      .print-p-1 { padding: 0.25rem !important; }
      .print-border-black { border-color: black !important; }
      .print-text-black { color: black !important; }
      .print-shadow-none { box-shadow: none !important; }
      .print-mb-4 { margin-bottom: 1rem !important; }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen">

  <div id="app"></div>
  <div id="toast-container" class="fixed bottom-4 right-4 z-[100] flex flex-col gap-2 print-hidden"></div>

  <script>
    // --- State Management ---
    const state = {
      gameState: 'setup', // 'setup', 'generating', 'playing', 'results'
      documentText: '',
      fileName: '',
      userApiKey: '',
      config: {
        tfCount: 5,
        mcCount: 5,
        totalScore: 100,
        tfWeight: 50,
        mcWeight: 50,
        difficulty: '中等'
      },
      examData: null,
      userAnswers: {},
      error: '',
      
      // LLM Features
      summary: '',
      isSummarizing: false,
      studyAdvice: '',
      isGeneratingAdvice: false,
      
      // UI / Other states
      isDownloadingScore: false,
      showGasModal: false,
      formTitle: '隨堂單元',
      elapsedTime: 0
    };

    let timerInterval = null;

    // --- Init & LocalStorage ---
    window.onload = () => {
      const savedKey = localStorage.getItem('exam_generator_apikey');
      if (savedKey) state.userApiKey = savedKey;
      
      const savedConfig = localStorage.getItem('exam_generator_config');
      if (savedConfig) {
        try { state.config = JSON.parse(savedConfig); } catch(e){}
      }
      render();
    };

    // --- Utility Functions ---
    const escapeHTML = (str) => {
      if(typeof str !== 'string') return '';
      return str.replace(/[&<>'"]/g, tag => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[tag] || tag));
    };

    const formatTime = (seconds) => {
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = (seconds % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    };

    const showToast = (message, type = 'info') => {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      
      let bgClass = 'bg-blue-500';
      let icon = '<i data-lucide="info" class="w-5 h-5"></i>';
      
      if (type === 'error') {
        bgClass = 'bg-red-500';
        icon = '<i data-lucide="alert-triangle" class="w-5 h-5"></i>';
      } else if (type === 'success') {
        bgClass = 'bg-green-500';
        icon = '<i data-lucide="check-circle" class="w-5 h-5"></i>';
      }

      toast.className = `px-4 py-3 rounded-lg shadow-lg text-white font-medium flex items-center gap-2 toast-enter ${bgClass}`;
      toast.innerHTML = `${icon} <span>${escapeHTML(message)}</span>`;
      
      container.appendChild(toast);
      lucide.createIcons({ root: toast });

      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(10px)';
        toast.style.transition = 'all 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    };

    // --- Timer System ---
    const startTimer = () => {
      state.elapsedTime = 0;
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        state.elapsedTime++;
        const display = document.getElementById('timer-display');
        if (display) display.innerText = formatTime(state.elapsedTime);
      }, 1000);
    };

    const stopTimer = () => {
      if (timerInterval) clearInterval(timerInterval);
    };

    // --- Event Handlers ---
    window.handleDocumentTextChange = (value) => { state.documentText = value; };

    window.handleApiKeyChange = (value) => {
      state.userApiKey = value;
      localStorage.setItem('exam_generator_apikey', value);
      // 不觸發 render 避免失去焦點
    };

    window.handleConfigChange = (name, value) => {
      let newValue = value;
      if (name === 'tfCount' || name === 'mcCount') {
        newValue = Math.max(0, Math.min(20, parseInt(value) || 0));
      } else if (name === 'totalScore') {
        newValue = Math.max(10, parseInt(value) || 100);
      } else if (name === 'tfWeight') {
        newValue = Math.max(0, Math.min(100, parseInt(value) || 0));
        state.config.tfWeight = newValue;
        state.config.mcWeight = 100 - newValue;
      } else if (name === 'mcWeight') {
        newValue = Math.max(0, Math.min(100, parseInt(value) || 0));
        state.config.mcWeight = newValue;
        state.config.tfWeight = 100 - newValue;
      }

      if (name !== 'tfWeight' && name !== 'mcWeight') state.config[name] = newValue;
      
      localStorage.setItem('exam_generator_config', JSON.stringify(state.config));
      render();
    };

    window.handleFileUpload = (e) => {
      const file = e.target.files[0];
      if (!file) return;

      state.fileName = file.name;
      const fileNameLower = file.name.toLowerCase();

      if (fileNameLower.endsWith('.docx')) {
        if (!window.mammoth) {
          showToast('Word 解析模組載入中，請稍候。', 'error');
          return;
        }
        const reader = new FileReader();
        reader.onload = async (event) => {
          try {
            const arrayBuffer = event.target.result;
            const result = await window.mammoth.extractRawText({ arrayBuffer });
            if (result.value.trim()) {
              state.documentText = result.value;
              showToast('Word 檔案解析成功！', 'success');
              render();
            } else {
              showToast('無法提取文字，請確認檔案內容。', 'error');
            }
          } catch (err) {
            showToast('DOCX 解析失敗，請直接貼上文字。', 'error');
          }
        };
        reader.readAsArrayBuffer(file);
        return;
      }

      if (fileNameLower.endsWith('.pdf') || fileNameLower.endsWith('.doc')) {
        showToast('建議直接複製 PDF 內容並貼上，以獲取最佳效果。', 'info');
        return;
      }

      const reader = new FileReader();
      reader.onload = (event) => {
        state.documentText = event.target.result;
        showToast('檔案讀取成功！', 'success');
        render();
      };
      reader.onerror = () => showToast('檔案讀取失敗', 'error');
      reader.readAsText(file);
    };

    // --- API Call Core ---
    const callGemini = async (prompt, isJson = false) => {
      const currentKey = state.userApiKey.trim();
      if (!currentKey) throw new Error('請先輸入您的 Gemini API Key！');

      const modelName = 'gemini-2.5-flash';
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${currentKey}`;
      
      const payload = { contents: [{ parts: [{ text: prompt }] }] };
      if (isJson) payload.generationConfig = { responseMimeType: "application/json" };

      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      
      if (!response.ok) {
        let errMsg = 'API 呼叫失敗';
        try { const errData = await response.json(); errMsg = errData.error?.message || errMsg; } catch(e){}
        throw new Error(errMsg);
      }

      const data = await response.json();
      return data.candidates?.[0]?.content?.parts?.[0]?.text;
    };

    window.generateSummary = async () => {
      if (!state.documentText.trim()) {
        showToast('請先輸入資料內容！', 'error');
        return;
      }
      state.isSummarizing = true;
      render();

      try {
        const prompt = `請以繁體中文，針對以下文本提供3到5點的核心重點摘要，幫助學生在考試前快速掌握關鍵。請勿過度冗長。\n\n文本：\n${state.documentText}`;
        const result = await callGemini(prompt);
        state.summary = result || '無法產生摘要。';
        showToast('重點摘要產生完成！', 'success');
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        state.isSummarizing = false;
        render();
      }
    };

    window.generateExam = async () => {
      if (!state.userApiKey.trim()) {
        state.error = '請先在右側設定區輸入您的 Gemini API Key！';
        render(); return;
      }
      if (!state.documentText.trim()) {
        state.error = '請輸入或上傳參考資料內容！';
        render(); return;
      }
      if (state.config.tfCount === 0 && state.config.mcCount === 0) {
        state.error = '題目數量總和不能為零！';
        render(); return;
      }

      state.gameState = 'generating';
      state.error = '';
      render();

      const prompt = `你是一個專業的考試題目產生器。請根據以下提供的「文本內容」產生測驗題目。
【考卷設定】
- 難易度：${state.config.difficulty}
- 是非題數量：產生 ${state.config.tfCount} 題
- 選擇題數量：產生 ${state.config.mcCount} 題

【命題嚴格限制】
1. 題目必須涵蓋來源的主要內容/重點概念，絕不可重複相同概念換句話說。
2. 是非題：每題 2 個選項（是/否），且只有 1 個正確答案。
3. 選擇題：每題 4 個選項，且只有 1 個正確答案。
4. 干擾選項要合理：必須像是容易選錯的迷思，不得與正解同義。
5. 絕對不可出「以上皆是」或「以上皆非」的選項。

【輸出格式】(必須為嚴格的 JSON)
{
  "trueFalse": [
    { "id": "tf_1", "type": "tf", "question": "...", "options": ["是", "否"], "answer": "是", "explanation": "..." }
  ],
  "multipleChoice": [
    { "id": "mc_1", "type": "mc", "question": "...", "options": ["選項A", "選項B", "選項C", "選項D"], "answer": "選項A", "explanation": "..." }
  ]
}

【文本內容】
${state.documentText}`;

      try {
        const result = await callGemini(prompt, true);
        const parsedData = JSON.parse(result);
        
        state.examData = {
          trueFalse: parsedData.trueFalse || [],
          multipleChoice: parsedData.multipleChoice || [],
        };
        state.userAnswers = {};
        state.gameState = 'playing';
        showToast('考卷產生成功！開始測驗。', 'success');
        startTimer();
      } catch (err) {
        state.error = err.message || '產生考卷時發生錯誤';
        state.gameState = 'setup';
      } finally {
        render();
      }
    };

    window.generateStudyAdvice = async () => {
      state.isGeneratingAdvice = true;
      render();

      const wrongQuestions = [];
      [...(state.examData.trueFalse || []), ...(state.examData.multipleChoice || [])].forEach(q => {
        if (state.userAnswers[q.id] && !state.userAnswers[q.id].isCorrect) {
           wrongQuestions.push(`題目：${q.question}\n錯答：${state.userAnswers[q.id].selectedOption}\n正解：${q.answer}\n解析：${q.explanation}`);
        }
      });

      let prompt = wrongQuestions.length === 0 
        ? `學生在測驗中獲得滿分！請用繁體中文給予大約 100 字的熱烈讚美與鼓勵。`
        : `學生答錯了以下題目，請根據錯誤概念，以繁體中文撰寫約 150-200 字的「專屬弱點分析與學習建議」。語氣要溫暖具鼓勵性：\n\n${wrongQuestions.join('\n\n')}`;

      try {
        const result = await callGemini(prompt);
        state.studyAdvice = result;
        showToast('分析建議已產生！', 'success');
      } catch (err) {
        showToast('產生建議失敗：' + err.message, 'error');
      } finally {
        state.isGeneratingAdvice = false;
        render();
      }
    };

    // --- Interactive Logic ---
    window.handleAnswerSelect = (questionId, optIndexStr) => {
      if (state.userAnswers[questionId]) return;
      
      const targetQ = [...state.examData.trueFalse, ...state.examData.multipleChoice].find(q => q.id === questionId);
      if(!targetQ) return;
      
      const optIndex = parseInt(optIndexStr);
      const selectedOption = targetQ.options[optIndex];
      const isCorrect = selectedOption === targetQ.answer;

      state.userAnswers[questionId] = { selectedOption, isCorrect };
      render();
    };

    window.isExamFinished = () => {
      if (!state.examData) return false;
      return Object.keys(state.userAnswers).length === (state.examData.trueFalse.length + state.examData.multipleChoice.length);
    };

    window.handleFinishExam = () => {
      if (!window.isExamFinished() && !window.confirm("尚有未答題目，確定要交卷嗎？未答將以零分計。")) return;
      stopTimer();
      state.gameState = 'results';
      render();
    };

    window.calculateScores = () => {
      if (!state.examData) return { total: 0, tfScore: 0, mcScore: 0, accuracy: 0, tfCorrect:0, mcCorrect:0, tfTotalQuestions:0, mcTotalQuestions:0 };

      const tfTotalQuestions = state.examData.trueFalse.length;
      const mcTotalQuestions = state.examData.multipleChoice.length;
      
      let tfCorrect = 0, mcCorrect = 0;
      state.examData.trueFalse.forEach(q => { if (state.userAnswers[q.id]?.isCorrect) tfCorrect++; });
      state.examData.multipleChoice.forEach(q => { if (state.userAnswers[q.id]?.isCorrect) mcCorrect++; });

      const tfMaxPoints = state.config.totalScore * (state.config.tfWeight / 100);
      const mcMaxPoints = state.config.totalScore * (state.config.mcWeight / 100);

      const tfScore = tfTotalQuestions > 0 ? (tfCorrect / tfTotalQuestions) * tfMaxPoints : 0;
      const mcScore = mcTotalQuestions > 0 ? (mcCorrect / mcTotalQuestions) * mcMaxPoints : 0;

      const totalQuestions = tfTotalQuestions + mcTotalQuestions;
      const accuracy = totalQuestions > 0 ? Math.round(((tfCorrect + mcCorrect) / totalQuestions) * 100) : 0;

      return { 
        total: Math.round(tfScore + mcScore), 
        tfScore: Math.round(tfScore), 
        mcScore: Math.round(mcScore), 
        accuracy, tfCorrect, mcCorrect, tfTotalQuestions, mcTotalQuestions
      };
    };

    window.printExamPaper = () => { window.print(); };

    window.downloadScoreScreen = async () => {
      if (state.isDownloadingScore || !window.html2canvas) return;
      state.isDownloadingScore = true;
      render();
      
      setTimeout(async () => {
        try {
          const resultNode = document.getElementById('result-screen-content');
          const buttonsNode = document.getElementById('result-action-buttons');
          if (buttonsNode) buttonsNode.style.display = 'none';
          
          const canvas = await window.html2canvas(resultNode, { scale: 1.5, backgroundColor: '#ffffff', useCORS: true });
          if (buttonsNode) buttonsNode.style.display = 'flex';

          const link = document.createElement('a');
          link.href = canvas.toDataURL("image/png");
          link.download = '測驗成績單.png';
          link.click();
          showToast('成績單已下載', 'success');
        } catch (error) {
          showToast('截圖失敗，請稍後再試', 'error');
        } finally {
          state.isDownloadingScore = false;
          render();
        }
      }, 100);
    };

    window.toggleGasModal = (show) => {
      state.showGasModal = show;
      render();
    };

    window.handleFormTitleChange = (val) => {
      state.formTitle = val;
      const ta = document.getElementById('gas-textarea');
      if (ta) ta.value = window.getGasScriptCode();
    };

    window.getGasScriptCode = () => {
      if (!state.examData) return '';
      
      // 計算各題配分 (處理無法整除時的餘數)
      const tfTotal = state.examData.trueFalse ? state.examData.trueFalse.length : 0;
      const mcTotal = state.examData.multipleChoice ? state.examData.multipleChoice.length : 0;
      
      const totalScoreNum = Number(state.config.totalScore) || 100;
      const tfWeightNum = Number(state.config.tfWeight) || 50;
      const mcWeightNum = Number(state.config.mcWeight) || 50;

      const tfMaxPoints = Math.round(totalScoreNum * (tfWeightNum / 100));
      const mcMaxPoints = Math.round(totalScoreNum * (mcWeightNum / 100));

      const tfPointsArr = [];
      if (tfTotal > 0) {
        const base = Math.floor(tfMaxPoints / tfTotal);
        let remainder = tfMaxPoints % tfTotal;
        for (let i = 0; i < tfTotal; i++) {
          tfPointsArr.push(base + (remainder > 0 ? 1 : 0));
          remainder--;
        }
      }

      const mcPointsArr = [];
      if (mcTotal > 0) {
        const base = Math.floor(mcMaxPoints / mcTotal);
        let remainder = mcMaxPoints % mcTotal;
        for (let i = 0; i < mcTotal; i++) {
          mcPointsArr.push(base + (remainder > 0 ? 1 : 0));
          remainder--;
        }
      }
      
      // Data Processing for GAS：直接把分數綁定進物件裡
      const processQuestions = (questions, pointsArr) => {
        if (!questions) return [];
        return questions.map((q, index) => {
          const ansStr = String(q.answer || "").trim();
          let cIndex = q.options.findIndex(opt => String(opt).trim() === ansStr);
          if (cIndex === -1) cIndex = 0; // fallback
          const { answer, ...restOfQ } = q;
          return { 
            ...restOfQ, 
            correctIndex: cIndex,
            points: pointsArr[index] || 0 // 🌟 將分數直接寫入該題資料
          };
        });
      };

      const processedData = {
        trueFalse: processQuestions(state.examData.trueFalse, tfPointsArr),
        multipleChoice: processQuestions(state.examData.multipleChoice, mcPointsArr)
      };

      return `function createQuizForm() {
  var formTitle = "${state.formTitle} 測驗";
  var form = FormApp.create(formTitle);
  form.setIsQuiz(true);
  
  // 包含「題目配分 (points)」的完整考卷資料
  var examData = ${JSON.stringify(processedData, null, 2)};

  // 1. 處理是非題
  if (examData.trueFalse && examData.trueFalse.length > 0) {
    examData.trueFalse.forEach(function(q) {
      var item = form.addMultipleChoiceItem();
      item.setTitle(q.question);
      item.setRequired(true);
      if (q.points > 0) item.setPoints(q.points); // 🌟 設定該題分數
      
      var choices = [];
      for (var i = 0; i < q.options.length; i++) {
        choices.push(item.createChoice(String(q.options[i]).trim(), i === Number(q.correctIndex)));
      }
      item.setChoices(choices);
      
      var feedback = FormApp.createFeedback().setText("解析：\\n" + (q.explanation || "無")).build();
      item.setFeedbackForCorrect(feedback).setFeedbackForIncorrect(feedback);
    });
  }

  // 2. 處理選擇題
  if (examData.multipleChoice && examData.multipleChoice.length > 0) {
    examData.multipleChoice.forEach(function(q) {
      var item = form.addMultipleChoiceItem();
      item.setTitle(q.question);
      item.setRequired(true);
      if (q.points > 0) item.setPoints(q.points); // 🌟 設定該題分數
      
      var choices = [];
      for (var i = 0; i < q.options.length; i++) {
        choices.push(item.createChoice(String(q.options[i]).trim(), i === Number(q.correctIndex)));
      }
      item.setChoices(choices);
      
      var feedback = FormApp.createFeedback().setText("解析：\\n" + (q.explanation || "無")).build();
      item.setFeedbackForCorrect(feedback).setFeedbackForIncorrect(feedback);
    });
  }

  Logger.log("測驗表單建立成功！請點擊此連結編輯表單：" + form.getEditUrl());
}`;
    };

    window.copyGasCode = () => {
      navigator.clipboard.writeText(window.getGasScriptCode())
        .then(() => showToast('GAS 程式碼已複製！', 'success'))
        .catch(() => showToast('複製失敗，請手動選取', 'error'));
    };

    window.resetApp = () => {
      state.gameState = 'setup';
      state.examData = null;
      state.userAnswers = {};
      state.studyAdvice = '';
      state.summary = '';
      stopTimer();
      render();
    };

    // --- Render Logic ---
    const renderQuestion = (q, index, typeLabel) => {
      const userAnswer = state.userAnswers[q.id];
      const isAnswered = !!userAnswer;

      let optionsHtml = q.options.map((opt, i) => {
        let btnClass = "w-full text-left p-4 rounded-lg border-2 transition-all duration-200 print-border-0 print-p-1 ";
        let iconHtml = '<span class="hidden print-inline-block font-bold mr-2">(&nbsp;&nbsp;&nbsp;&nbsp;)</span>';

        if (!isAnswered) {
          btnClass += "border-slate-200 hover:border-blue-400 hover:bg-blue-50 text-slate-700 cursor-pointer";
        } else {
          if (opt === q.answer) {
            btnClass += "border-green-500 bg-green-50 text-green-800 font-medium";
            iconHtml += `<i data-lucide="check-circle" class="w-5 h-5 text-green-500 inline mr-2 print-hidden"></i>`;
          } else if (userAnswer.selectedOption === opt && !userAnswer.isCorrect) {
            btnClass += "border-red-400 bg-red-50 text-red-700 opacity-80";
            iconHtml += `<i data-lucide="x-circle" class="w-5 h-5 text-red-500 inline mr-2 print-hidden"></i>`;
          } else {
            btnClass += "border-slate-100 bg-slate-50 text-slate-400 cursor-not-allowed opacity-50";
          }
        }

        return `
          <button ${isAnswered ? 'disabled' : ''} onclick="handleAnswerSelect('${q.id}', '${i}')" class="${btnClass}">
            <div class="flex items-center">${iconHtml}<span>${escapeHTML(opt)}</span></div>

          <div class="mt-6 pl-12 pr-4 py-4 rounded-lg border-l-4 print-hidden ${userAnswer.isCorrect ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500'}">

               ${userAnswer.isCorrect

            </p>
            <div class="text-slate-700">
              <span class="font-semibold">正解為：</span> ${escapeHTML(q.answer)}
              <hr class="my-2 border-slate-200/50" />

          </div>

          </div>
          <div class="space-y-3 pl-12 print-space-y-1">
            ${optionsHtml}

          ${feedbackHtml}
        </div>

        let tfHtml = state.examData.trueFalse.length > 0 
          ? `<div><h2 class="text-xl font-bold text-slate-700 mb-4 border-b-2 border-slate-200 pb-2 print-border-black print-text-black">一、是非題</h2>${state.examData.trueFalse.map((q, i) => renderQuestion(q, i, '是非')).join('')}</div>` : '';
        
        let mcHtml = state.examData.multipleChoice.length > 0 
          ? `<div class="mt-8"><h2 class="text-xl font-bold text-slate-700 mb-4 border-b-2 border-slate-200 pb-2 print-border-black print-text-black">二、選擇題</h2>${state.examData.multipleChoice.map((q, i) => renderQuestion(q, i, '選擇')).join('')}</div>` : '';

                </button>
              </div>
            </div>

            <!-- Exam Title & Print Header (Editable) -->
            <div class="text-center mb-8">

                <span>班級/姓名：___________________</span>
                <span>得分：___________________</span>

            </div>

              ${tfHtml}
              ${mcHtml}
            </div>

            <div class="mt-12 text-center print-hidden">
              <button onclick="handleFinishExam()" class="px-12 py-4 rounded-xl text-xl font-bold text-white shadow-lg transition-all ${window.isExamFinished() ? 'bg-green-600 hover:bg-green-700 hover:scale-105 animate-pulse' : 'bg-slate-800 hover:bg-slate-900'}">

            </div>
          </div>

              <div class="flex justify-between items-center p-6 border-b border-slate-100 bg-slate-50">
